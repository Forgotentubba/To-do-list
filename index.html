<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List Avançada</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="title-box">
        <h1>To-Do List</h1>
        <p>Organize suas tarefas com busca, filtros, prioridade e salvamento automático.</p>
      </div>
      <button class="theme-toggle" id="themeToggle">🌙 Tema</button>
    </div>

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Digite uma nova tarefa..." />
      <select id="priorityInput">
        <option value="baixa">Prioridade baixa</option>
        <option value="media" selected>Prioridade média</option>
        <option value="alta">Prioridade alta</option>
      </select>
      <button class="primary-btn" id="addTaskBtn">Adicionar tarefa</button>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Buscar tarefa..." />
    </div>

    <div class="toolbar">
      <div class="filters">
        <button class="filter-btn active" data-filter="todas">Todas</button>
        <button class="filter-btn" data-filter="pendentes">Pendentes</button>
        <button class="filter-btn" data-filter="concluidas">Concluídas</button>
      </div>
      <div class="actions">
        <button class="action-btn" id="clearCompletedBtn">Limpar concluídas</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <span>Total</span>
        <strong id="totalCount">0</strong>
      </div>
      <div class="stat-card">
        <span>Pendentes</span>
        <strong id="pendingCount">0</strong>
      </div>
      <div class="stat-card">
        <span>Concluídas</span>
        <strong id="completedCount">0</strong>
      </div>
    </div>

    <ul id="taskList"></ul>
    <div class="empty-state" id="emptyState">Nenhuma tarefa encontrada.</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
